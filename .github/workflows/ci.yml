name: CI/CD

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NODE_ENV: test
      PORT: 3000
      DATABASE_URL: postgresql://test:test@localhost:5432/test?schema=public
      CORS_ORIGIN: http://localhost:3000
      LOG_LEVEL: silent
      ALLOWED_EMAIL_DOMAINS: example.ac.kr
      ACCESS_TOKEN_SECRET: ci_access_token_secret_for_tests
      REFRESH_TOKEN_SECRET: ci_refresh_token_secret_for_tests
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate Prisma schema
        run: npm run prisma:validate

      - name: Generate Prisma Client
        run: npm run prisma:generate

      - name: Lint
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

      - name: Test
        run: npm test

      - name: Validate Docker Compose configuration
        run: docker compose config

      - name: Verify Docker image build
        run: docker build --tag minki-server:ci .

  deploy:
    name: Deploy to EC2
    needs: verify
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    concurrency:
      group: production
      cancel-in-progress: false
    env:
      EC2_HOST: ${{ secrets.EC2_HOST }}
      EC2_USER: ${{ secrets.EC2_USER }}
      EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
    steps:
      - name: Check deployment secrets
        shell: bash
        run: |
          for name in EC2_HOST EC2_USER EC2_SSH_KEY DEPLOY_PATH; do
            if [[ -z "${!name}" ]]; then
              echo "::error::$name is not configured"
              exit 1
            fi
          done

      - name: Configure SSH
        shell: bash
        run: |
          install -d -m 700 "$HOME/.ssh"
          printf '%s\n' "$EC2_SSH_KEY" > "$HOME/.ssh/ec2_key"
          chmod 600 "$HOME/.ssh/ec2_key"
          ssh-keyscan -H "$EC2_HOST" > "$HOME/.ssh/known_hosts"

      - name: Deploy and verify
        shell: bash
        run: |
          escaped_deploy_path=$(printf '%q' "$DEPLOY_PATH")
          ssh -i "$HOME/.ssh/ec2_key" "${EC2_USER}@${EC2_HOST}" \
            "bash -s -- $escaped_deploy_path" <<'REMOTE'
          set -Eeuo pipefail

          cd "$1"
          previous_sha=$(git rev-parse HEAD)
          echo "Previous commit: $previous_sha"

          git fetch origin main
          git reset --hard origin/main
          echo "Deploying commit: $(git rev-parse HEAD)"

          docker builder prune --force
          docker image prune --force
          docker compose build
          docker compose up -d

          health_url='https://minki-api.duckdns.org/api/v1/health'
          for attempt in $(seq 1 12); do
            if curl --fail --silent --show-error --max-time 10 "$health_url" > /dev/null; then
              echo "Health check passed"
              exit 0
            fi

            echo "Health check failed ($attempt/12); retrying in 10 seconds"
            sleep 10
          done

          echo "Health check failed; collecting diagnostics"
          docker compose ps || true
          docker compose logs --tail=200 app || true

          echo "Rolling back to $previous_sha"
          git reset --hard "$previous_sha"
          docker compose build
          docker compose up -d
          echo "Rollback completed; database migrations were not rolled back"
          exit 1
          REMOTE
